<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="ds.css"><style>
.reccard{padding:32px 34px;}
.reccard .ty{font-size:31px;font-weight:700;margin-bottom:14px;}
.reccard .mt{font-size:28px;color:var(--t2);line-height:1.5;margin-bottom:18px;}
.reccard .chg{font-size:27px;color:var(--t1);}
.reccard .chg b{color:var(--coral);}
.adjbox{padding:30px 34px;}
.adjbox .h{font-size:30px;font-weight:700;margin-bottom:22px;}
.adjrow{display:flex;padding:18px 0;border-top:1px dashed var(--div);font-size:27px;}
.adjrow:first-of-type{border-top:none;}
.adjrow .k{width:150px;color:var(--t3);} .adjrow .v{flex:1;font-weight:600;}
.tabx{display:flex;gap:18px;margin:6px 4px 22px;}
.tabx .t{font-size:26px;color:var(--t2);background:#fff;border:1px solid #E7E8EE;border-radius:40px;padding:12px 30px;}
.tabx .t.on{color:var(--coral);border-color:var(--coral);background:var(--coral-wash);font-weight:600;}
.tk{padding:28px 32px;}
.tk .r1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;}
.tk .nm{font-size:30px;font-weight:700;flex:1;padding-right:16px;}
.tk .meta{font-size:24px;color:var(--t3);margin-bottom:14px;}
.tk .rsn{font-size:25px;color:var(--t2);line-height:1.55;background:#F7F8FA;border-radius:14px;padding:18px 22px;}
</style></head><body><div class="phone">
<div class="statusbar"><span>9:41</span><span class="ic">▪▪▪ 📶 🔋</span></div>
<div class="nav"><span class="back">‹</span><span class="title">计划变化详情</span></div>
<div class="content">
<div class="card reccard mb"><div class="ty">任务恢复</div>
<div class="mt">你恢复了 2 个任务，后续将结合计划安排。</div>
<div class="chg">本次变化：恢复 <b>2</b>｜今日任务不变</div></div>
<div class="card adjbox mb"><div class="h">调整内容</div>
<div class="adjrow"><span class="k">操作</span><span class="v">恢复任务</span></div>
<div class="adjrow"><span class="k">恢复数量</span><span class="v">2 个</span></div>
<div class="adjrow"><span class="k">触发方式</span><span class="v">手动恢复</span></div></div>
<div class="tabx"><span class="t on">全部 2</span><span class="t">恢复 2</span></div>
<div class="card tk mb"><div class="r1"><span class="nm">资料分析专项练习</span><span class="badge recover">恢复</span></div>
<div class="meta">练习 · 约30分钟</div>
<div class="rsn">该任务已恢复，后续将结合计划安排。</div></div>
<div class="card tk mb"><div class="r1"><span class="nm">言语理解精讲课</span><span class="badge recover">恢复</span></div>
<div class="meta">视频 · 约45分钟</div>
<div class="rsn">该任务已恢复，后续将结合计划安排。</div></div>
</div></div></body></html>
