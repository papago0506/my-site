<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="ds.css"><style>
.screen{width:750px;height:1400px;position:relative;background:linear-gradient(180deg,#EDE5F5,#F5F6FD);overflow:hidden;}
.mask{position:absolute;inset:0;background:rgba(28,30,42,.5);}
.dlg{position:absolute;left:40px;right:40px;bottom:70px;background:#fff;border-radius:36px;padding:44px 40px 40px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.dlg .h{font-size:36px;font-weight:700;text-align:center;margin-bottom:10px;}
.dlg .tip{font-size:23px;color:var(--coral);text-align:center;margin-bottom:24px;}
.dlg .body{font-size:27px;color:var(--t2);line-height:1.6;margin-bottom:26px;}
.stat{display:flex;gap:20px;margin:0 0 32px;}
.stat .box{flex:1;border:1px solid #EEE;border-radius:20px;padding:26px 0;text-align:center;}
.stat .num{font-size:50px;font-weight:800;}
.stat .box .k{font-size:24px;color:var(--t3);margin-top:6px;}
.acts{display:flex;gap:22px;}
.b{flex:1;text-align:center;padding:20px 0;border-radius:44px;}
.b .l{font-size:30px;font-weight:700;}
.b .s{font-size:21px;margin-top:4px;opacity:.9;}
.b-keep{border:2px solid #E2E3E9;color:var(--t2);}
.b-keep .s{color:var(--t3);}
.b-more{background:linear-gradient(135deg,var(--coral-2),var(--coral));color:#fff;box-shadow:0 10px 22px rgba(255,68,61,.3);}
.b-more .s{color:#fff;}
.foot{font-size:22px;color:var(--t3);text-align:center;line-height:1.6;margin-top:26px;}
.foot b{color:var(--coral);font-weight:600;}
</style></head><body>
<div class="screen"><div class="mask"></div>
<div class="dlg">
<div class="h">学习计划需要调整</div>
<div class="tip">当前每日学习时长排不下全部任务</div>
<div class="body">按你现在的设置，还差约 2.5 小时。你可以每天多学一点赶上，或保持当前节奏、把排不下的任务放入「未排入」。</div>
<div class="stat">
  <div class="box"><div class="num" style="color:var(--t1)">2.5<span style="font-size:26px">h</span></div><div class="k">还差时长</div></div>
  <div class="box"><div class="num" style="color:var(--coral)">8</div><div class="k">将未排入</div></div>
</div>
<div class="acts">
  <span class="b b-keep"><div class="l">保持节奏</div><div class="s">排不下转未排入</div></span>
  <span class="b b-more"><div class="l">多学赶上</div><div class="s">接受超出，尽量学完</div></span>
</div>
<div class="foot">备考时间不足时，右侧按钮变为 <b>全力追赶（按最快速度学习）</b>；30 秒不操作默认执行「多学赶上」，不会自动删任务。</div>
</div></div></body></html>
