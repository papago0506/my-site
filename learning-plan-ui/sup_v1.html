<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;}
:root{--coral:#FF443D;--coral-wash:#FFECEA;--t1:#23252D;--t3:#9296A6;--t4:#B4B7C0;--green:#24C789;--bg:#F5F6FD;--div:#F0F0F2;}
body{width:750px;background:var(--bg);color:var(--t1);}
.statusbar{height:88px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;font-size:30px;font-weight:600;}
.statusbar .ic{font-size:26px;letter-spacing:5px;}
.nav{height:96px;display:flex;align-items:center;justify-content:center;position:relative;}
.nav .back{position:absolute;left:32px;font-size:46px;} .nav .title{font-size:34px;font-weight:700;}
.content{padding:16px 28px 40px;}
.statetab{display:flex;gap:18px;margin-bottom:26px;}
.statetab .s{font-size:25px;color:#4F5157;background:#fff;border:1px solid #E7E8EE;border-radius:40px;padding:12px 30px;}
.statetab .s.on{color:var(--coral);border-color:var(--coral);background:var(--coral-wash);font-weight:600;}
.card{background:#fff;border-radius:26px;box-shadow:0 6px 24px rgba(31,35,60,.05);overflow:hidden;}
.row{display:flex;align-items:center;padding:30px 30px;border-top:1px solid var(--div);}
.row:first-child{border-top:none;}
.ic{width:48px;height:48px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;font-weight:700;margin-right:22px;flex-shrink:0;}
.ic.recite{background:linear-gradient(135deg,#FFB25A,#FF9A2E);} .ic.read{background:linear-gradient(135deg,#4BD69A,#1FB877);} .ic.prac{background:linear-gradient(135deg,#5AA9FF,#2E86FF);}
.mid{flex:1;min-width:0;}
.nm{font-size:29px;font-weight:700;line-height:1.35;overflow:hidden;text-overflow:ellipsis;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;}
.meta{font-size:23px;color:var(--t3);margin-top:10px;}
.act{margin-left:18px;flex-shrink:0;}
.btn-go{background:var(--coral-wash);color:var(--coral);font-size:25px;font-weight:600;padding:13px 26px;border-radius:12px;white-space:nowrap;}
.check{width:46px;height:46px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:30px;font-weight:700;}
.row.done .nm{color:var(--t4);} .row.done .ic{opacity:.4;} .row.done .meta{color:var(--t4);}
</style></head><body>
<div class="statusbar"><span>9:41</span><span class="ic">▪▪▪ 📶 🔋</span></div>
<div class="nav"><span class="back">‹</span><span class="title">补给任务</span></div>
<div class="content">
<div class="statetab"><span class="s on">全部</span><span class="s">已完成</span><span class="s">未完成</span></div>
<div class="card">
  <div class="row"><span class="ic recite">背</span><div class="mid"><div class="nm">背诵 · 习近平主持东北全面振兴座谈会</div><div class="meta">预计 10min ｜ 2026-03-12</div></div><span class="act"><span class="btn-go">去学习</span></span></div>
  <div class="row"><span class="ic prac">练</span><div class="mid"><div class="nm">智能练习 · 习近平主持东北全面振兴</div><div class="meta">预计 5min ｜ 题目数量 3 ｜ 2026-03-12</div></div><span class="act"><span class="btn-go">去练习</span></span></div>
  <div class="row"><span class="ic read">阅</span><div class="mid"><div class="nm">阅读 · 全过程人民民主的重大理念</div><div class="meta">预计 10min ｜ 2026-03-11</div></div><span class="act"><span class="btn-go">去学习</span></span></div>
  <div class="row done"><span class="ic recite">背</span><div class="mid"><div class="nm">背诵 · 法的规范作用（法理学）</div><div class="meta">用时 12min ｜ 2026-03-10</div></div><span class="act"><span class="check">✓</span></span></div>
  <div class="row done"><span class="ic prac">练</span><div class="mid"><div class="nm">智能练习 · 法的规范作用</div><div class="meta">题目数量 5 ｜ 2026-03-10</div></div><span class="act"><span class="check">✓</span></span></div>
</div>
</div></body></html>
