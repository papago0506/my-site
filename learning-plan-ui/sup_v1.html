<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="ds.css"><style>
.typetab{display:flex;gap:40px;padding:6px 8px 20px;}
.typetab .t{font-size:30px;color:var(--t3);}
.typetab .t.on{font-size:32px;font-weight:700;color:var(--t1);position:relative;}
.typetab .t.on::after{content:"";position:absolute;left:50%;transform:translateX(-50%);bottom:-14px;width:44px;height:6px;border-radius:3px;background:var(--coral);}
.statetab{display:flex;gap:16px;margin-bottom:26px;}
.statetab .s{font-size:25px;color:var(--t2);background:#fff;border:1px solid #E7E8EE;border-radius:40px;padding:12px 28px;}
.statetab .s.on{color:var(--coral);border-color:var(--coral);background:var(--coral-wash);font-weight:600;}
.sc{background:#fff;border-radius:22px;padding:28px 30px;margin-bottom:20px;box-shadow:0 4px 16px rgba(31,35,60,.05);display:flex;align-items:flex-start;}
.sc .ic{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:24px;color:#fff;margin-right:22px;flex-shrink:0;}
.ic.recite{background:linear-gradient(135deg,#FFB25A,#FF9A2E);} .ic.prac{background:linear-gradient(135deg,#5AA9FF,#2E86FF);} .ic.read{background:linear-gradient(135deg,#4BD69A,#1FB877);}
.sc .mid{flex:1;min-width:0;}
.sc .nm{font-size:29px;font-weight:700;margin-bottom:10px;line-height:1.35;}
.sc .meta{font-size:24px;color:var(--t3);}
.sc .push{font-size:23px;color:var(--t4);margin-top:8px;}
.sc .act{margin-left:16px;align-self:center;flex-shrink:0;}
</style></head><body><div class="phone">
