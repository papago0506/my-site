<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="ds.css"><style>
.screen{width:750px;height:1180px;position:relative;background:linear-gradient(180deg,#EDE5F5,#F5F6FD);overflow:hidden;}
.mask{position:absolute;inset:0;background:rgba(28,30,42,.5);}
.sheet{position:absolute;left:0;right:0;bottom:0;background:#fff;border-radius:36px 36px 0 0;padding:44px 44px 56px;box-shadow:0 -10px 40px rgba(0,0,0,.2);}
.sheet .h{font-size:36px;font-weight:700;text-align:center;margin-bottom:12px;}
.sheet .body{font-size:27px;color:var(--t2);line-height:1.6;text-align:center;margin-bottom:12px;}
.sheet .body b{color:var(--coral);font-weight:700;}
.sheet .gap{font-size:24px;color:var(--t3);text-align:center;margin-bottom:32px;}
.opt{display:flex;flex-direction:column;gap:20px;}
.o{text-align:center;padding:26px 0;border-radius:44px;font-size:30px;font-weight:700;}
.o .s{display:block;font-size:21px;font-weight:400;margin-top:4px;opacity:.9;}
.o-more{background:linear-gradient(135deg,var(--coral-2),var(--coral));color:#fff;box-shadow:0 10px 22px rgba(255,68,61,.3);}
.o-more .s{color:#fff;}
.o-del{border:2px solid var(--coral);color:var(--coral);}
.o-del .s{color:var(--t3);}
.o-cancel{color:var(--t3);font-weight:600;padding:14px 0;font-size:28px;}
.note{font-size:22px;color:var(--t3);text-align:center;line-height:1.6;margin-top:24px;}
.note b{color:var(--coral);}
</style></head><body>
<div class="screen"><div class="mask"></div>
<div class="sheet">
<div class="h">恢复任务</div>
<div class="body">恢复「逻辑填空 · 专项练习」后，计划总时长将超出你当前设定 <b>约 40min</b>。</div>
<div class="gap">你可以加学习时长排入，或移出当前优先级最低的任务为它腾位。</div>
<div class="opt">
  <span class="o o-more">去加时长<span class="s">延长备考 / 提高每日学习时长</span></span>
  <span class="o o-del">删除当前优先级最低任务<span class="s">腾出空间、保持时长不变</span></span>
  <span class="o o-cancel">取消</span>
</div>
<div class="note">恢复成功后该任务标记 <b>「已恢复 · 锁定」</b>，不再被系统自动删除。</div>
</div></div></body></html>
