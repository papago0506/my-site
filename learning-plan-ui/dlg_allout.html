<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><style>
:root{--coral:#FF443D;--coral-2:#FF6A5A;--coral-wash:#FFF1F0;--t1:#23252D;--t2:#4F5157;--t3:#919296;--div:#EEEEF1;}
*{margin:0;padding:0;box-sizing:border-box;font-family:"PingFang SC","Helvetica Neue",Arial,sans-serif;-webkit-font-smoothing:antialiased;}
.screen{width:750px;height:1200px;position:relative;background:linear-gradient(180deg,#EDE5F5,#F5F6FD);overflow:hidden;}
.mask{position:absolute;inset:0;background:rgba(28,30,42,.5);}
.dlg{position:absolute;left:40px;right:40px;bottom:70px;background:#fff;border-radius:36px;padding:46px 40px 40px;box-shadow:0 20px 60px rgba(0,0,0,.25);}
.h{font-size:36px;font-weight:700;text-align:center;margin-bottom:20px;}
.body{font-size:27px;color:var(--t2);line-height:1.6;text-align:center;margin-bottom:34px;}
.body b{color:var(--coral);font-weight:700;}
.acts{display:flex;gap:22px;}
.b{flex:1;text-align:center;padding:20px 0;border-radius:44px;}
.b .l{font-size:30px;font-weight:700;} .b .s{font-size:21px;margin-top:4px;}
.b-sec{border:2px solid #E2E3E9;color:var(--t2);} .b-sec .s{color:var(--t3);}
.b-pri{background:linear-gradient(135deg,var(--coral-2),var(--coral));color:#fff;box-shadow:0 10px 22px rgba(255,68,61,.3);} .b-pri .s{color:#fff;opacity:.9;}
</style></head><body>
<div class="screen"><div class="mask"></div>
<div class="dlg">
<div class="h">学习时间不足</div>
<div class="body">按常规学习时长，后续计划学不完。开启<b>全力追赶</b>后每天按最大时长学习，可少删或不删任务；也可以直接接受删减。</div>
<div class="acts">
  <span class="b b-sec"><div class="l">接受删减</div><div class="s">保持当前时长</div></span>
  <span class="b b-pri"><div class="l">全力追赶</div><div class="s">按最快速度学习</div></span>
</div>
</div></div></body></html>
