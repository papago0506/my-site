<!DOCTYPE html><html lang="zh"><head><meta charset="utf-8"><link rel="stylesheet" href="ds.css"><style>
.reccard{padding:32px 34px;}
.reccard .ty{font-size:31px;font-weight:700;margin-bottom:14px;}
.reccard .mt{font-size:28px;color:var(--t2);line-height:1.5;margin-bottom:18px;}
.reccard .chg{font-size:27px;color:var(--t1);}
.reccard .chg b{color:var(--coral);}
.adjbox{padding:30px 34px;}
.adjbox .h{font-size:29px;font-weight:700;margin-bottom:20px;}
.adjrow{display:flex;padding:18px 0;border-top:1px dashed var(--div);font-size:27px;}
.adjrow:first-of-type{border-top:none;}
.adjrow .k{width:200px;color:var(--t3);} .adjrow .v{flex:1;font-weight:600;}
.affcard{padding:8px 0 20px;}
.cgrp{font-size:26px;font-weight:700;padding:26px 34px 6px;color:var(--t1);}
.cgrp .cnt{color:var(--t3);font-weight:400;font-size:24px;margin-left:8px;}
.crow{display:flex;align-items:center;padding:22px 34px;border-top:1px solid var(--div);}
.crow .ci{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;margin-right:20px;flex-shrink:0;}
.crow .ci.video{background:linear-gradient(135deg,#FFA24D,#FF8A2A);}
.crow .ci.prac{background:linear-gradient(135deg,#5AA9FF,#2E86FF);}
.crow .cn{flex:1;font-size:28px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.crow.del .cn{color:var(--t4);} .crow.del .ci{opacity:.45;}
</style></head><body><div class="phone">

</div>
<div class="card adjbox mb"><div class="h">调整内容</div>
<div class="adjrow"><span class="k">调整前</span><span class="v">每日 2 小时</span></div>
<div class="adjrow"><span class="k">调整后</span><span class="v">每日 3 小时</span></div>
